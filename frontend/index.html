<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NomNom UMSS</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="/frontend/images/logo.png">
</head>
<body>

<nav>
    <h2>🍔 NomNom UMSS</h2>

    <div class="search">
        <input type="text" placeholder="Buscar comida o puesto...">
        <button>🔍</button>
    </div>
</nav>

<header class="hero">
    <h1>Descubre la mejor comida cerca de la UMSS</h1>
    <p>Compara precios, calificaciones y encuentra tu próximo almuerzo.</p>
</header>

<main>

    <section>
        <h2>🏆 Ranking</h2>
        <div id="ranking" class="cards"></div>
    </section>

    <section>
        <h2>🍽️ Puestos de comida</h2>
        <div id="food-stalls" class="cards"></div>
    </section>

    <section>
        <h2>🍔 Menú</h2>
        <div id="menu" class="cards"></div>
    </section>

</main>

<script src="js/app.js"></script>

</body>
</html>
